<svg width="1160" height="470" viewBox="0 0 1160 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RapidHMI architecture: an Interface Control Document defines a RapidHMI project containing receivers, schemas, rule sets and bindings. The project is validated and run as an interactive mock HMI with widgets such as gauges, status LEDs, switches, dials and buttons. Incoming protocol messages update the widgets, and operating the widgets sends protocol messages back to the connected system.">
  <defs>
    <linearGradient id="wf-accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="wfa" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <!-- ===== phase captions ===== -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">
    <text x="124" y="74" text-anchor="middle" fill="#6f819b">CONFIGURE</text>
    <text x="520" y="74" text-anchor="middle" fill="#2dd4bf">RUN LIVE</text>
  </g>

  <!-- ===== build pipeline (left) ===== -->
  <g font-family="Inter, sans-serif">
    <!-- ICD -->
    <rect x="24" y="92" width="200" height="58" rx="10" fill="#0f1622" stroke="#243248"/>
    <text x="40" y="121" font-size="18" font-weight="800" fill="#e7edf5">ICD</text>
    <text x="40" y="139" font-size="10" fill="#9aacc4">Interface Control Document</text>

    <line x1="124" y1="150" x2="124" y2="162" stroke="#2dd4bf" stroke-width="2" marker-end="url(#wfa)"/>

    <!-- Project -->
    <rect x="24" y="164" width="200" height="104" rx="10" fill="#0f1622" stroke="#243248"/>
    <text x="40" y="188" font-size="13" font-weight="700" fill="#e7edf5">RapidHMI Project</text>
    <g font-size="10" fill="#9aacc4" text-anchor="middle">
      <rect x="40" y="198" width="84" height="22" rx="11" fill="#18243a" stroke="#243248"/>
      <text x="82" y="213">Receivers</text>
      <rect x="130" y="198" width="84" height="22" rx="11" fill="#18243a" stroke="#243248"/>
      <text x="172" y="213">Schemas</text>
      <rect x="40" y="226" width="84" height="22" rx="11" fill="#18243a" stroke="#243248"/>
      <text x="82" y="241">Rule Sets</text>
      <rect x="130" y="226" width="84" height="22" rx="11" fill="#18243a" stroke="#243248"/>
      <text x="172" y="241">Bindings</text>
    </g>

    <line x1="124" y1="268" x2="124" y2="280" stroke="#2dd4bf" stroke-width="2" marker-end="url(#wfa)"/>

    <!-- Validate & Run -->
    <rect x="24" y="282" width="200" height="56" rx="10" fill="#0f1622" stroke="url(#wf-accent)" stroke-opacity="0.55"/>
    <path d="M42 309 l4 4 l8 -9" fill="none" stroke="#2dd4bf" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="316" font-size="14" font-weight="700" fill="#e7edf5">Validate &amp; Run</text>
  </g>

  <!-- elbow connector: Validate &amp; Run -> Mock HMI -->
  <path d="M224 310 L260 310 L260 248 L296 248" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#wfa)"/>

  <!-- ===== Mock HMI panel (centre) ===== -->
  <rect x="300" y="88" width="440" height="320" rx="14" fill="#0f1622" stroke="url(#wf-accent)" stroke-opacity="0.5"/>
  <!-- title bar -->
  <rect x="300" y="88" width="440" height="34" rx="14" fill="#0e1726"/>
  <rect x="300" y="104" width="440" height="18" fill="#0e1726"/>
  <text x="320" y="110" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="1" fill="#e7edf5">MOCK HMI</text>
  <text x="708" y="110" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#6f819b">live</text>
  <circle cx="722" cy="106" r="4" fill="#34d399"/>

  <!-- widget tiles -->
  <g font-family="Inter, sans-serif">
    <!-- tile: gauge -->
    <rect x="316" y="138" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="328" y="156" font-size="9.5" letter-spacing=".5" fill="#6f819b">SPEED</text>
    <path d="M353 200 A26 26 0 0 1 405 200" fill="none" stroke="#223149" stroke-width="5" stroke-linecap="round"/>
    <path d="M353 200 A26 26 0 0 1 387 175" fill="none" stroke="url(#wf-accent)" stroke-width="5" stroke-linecap="round"/>
    <line x1="379" y1="200" x2="389" y2="178" stroke="#e7edf5" stroke-width="2" stroke-linecap="round"/>
    <circle cx="379" cy="200" r="2.5" fill="#e7edf5"/>

    <!-- tile: digital display -->
    <rect x="456" y="138" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="468" y="156" font-size="9.5" letter-spacing=".5" fill="#6f819b">ALTITUDE</text>
    <rect x="468" y="166" width="102" height="44" rx="6" fill="#08111d" stroke="#1c2a42"/>
    <text x="519" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#2dd4bf">12 480</text>

    <!-- tile: status LEDs -->
    <rect x="596" y="138" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="608" y="156" font-size="9.5" letter-spacing=".5" fill="#6f819b">STATUS</text>
    <g font-size="11" fill="#9aacc4">
      <circle cx="615" cy="174" r="5" fill="#34d399"/><text x="628" y="178">LINK</text>
      <circle cx="615" cy="194" r="5" fill="#34d399"/><text x="628" y="198">POWER</text>
      <circle cx="615" cy="214" r="5" fill="#fbbf24"/><text x="628" y="218">FAULT</text>
    </g>

    <!-- tile: toggle switch -->
    <rect x="316" y="240" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="328" y="258" font-size="9.5" letter-spacing=".5" fill="#6f819b">ARMED</text>
    <rect x="328" y="276" width="58" height="28" rx="14" fill="url(#wf-accent)"/>
    <circle cx="372" cy="290" r="11" fill="#0b1018"/>
    <text x="398" y="294" font-size="12" font-weight="600" fill="#e7edf5">ON</text>

    <!-- tile: rotary dial -->
    <rect x="456" y="240" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="468" y="258" font-size="9.5" letter-spacing=".5" fill="#6f819b">MODE</text>
    <circle cx="519" cy="290" r="22" fill="#0b1018" stroke="#2c3c58" stroke-width="2"/>
    <g stroke="#2c3c58" stroke-width="1.5" stroke-linecap="round">
      <line x1="519" y1="266" x2="519" y2="270"/>
      <line x1="495" y1="290" x2="499" y2="290"/>
      <line x1="543" y1="290" x2="539" y2="290"/>
      <line x1="502" y1="273" x2="505" y2="276"/>
      <line x1="536" y1="273" x2="533" y2="276"/>
    </g>
    <line x1="519" y1="290" x2="532" y2="278" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="519" cy="290" r="2.5" fill="#e7edf5"/>

    <!-- tile: push button -->
    <rect x="596" y="240" width="126" height="88" rx="8" fill="#0e1726" stroke="#223149"/>
    <text x="608" y="258" font-size="9.5" letter-spacing=".5" fill="#6f819b">COMMAND</text>
    <rect x="610" y="270" width="98" height="38" rx="9" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="659" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#2dd4bf">SEND</text>

    <!-- progress bar (spans) -->
    <text x="316" y="352" font-size="9.5" letter-spacing=".5" fill="#6f819b">TASK PROGRESS</text>
    <text x="722" y="352" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#9aacc4">65%</text>
    <rect x="316" y="360" width="406" height="10" rx="5" fill="#1c2a42"/>
    <rect x="316" y="360" width="264" height="10" rx="5" fill="url(#wf-accent)"/>
  </g>

  <!-- ===== bi-directional protocol data ===== -->
  <g font-family="Inter, sans-serif" font-size="11">
    <text x="800" y="200" text-anchor="middle" fill="#9aacc4">Incoming</text>
    <line x1="856" y1="216" x2="746" y2="216" stroke="#2dd4bf" stroke-width="2" marker-end="url(#wfa)"/>
    <text x="800" y="252" text-anchor="middle" font-size="9" fill="#6f819b">protocol data</text>
    <line x1="744" y1="280" x2="854" y2="280" stroke="#2dd4bf" stroke-width="2" marker-end="url(#wfa)"/>
    <text x="800" y="300" text-anchor="middle" fill="#9aacc4">Outgoing</text>
  </g>

  <!-- ===== connected system (right) ===== -->
  <rect x="860" y="190" width="220" height="116" rx="12" fill="#0f1622" stroke="#243248"/>
  <g stroke="#2dd4bf" stroke-width="1.7" stroke-linecap="round" fill="none">
    <rect x="952" y="214" width="36" height="32" rx="4"/>
    <line x1="962" y1="214" x2="962" y2="208"/>
    <line x1="970" y1="214" x2="970" y2="208"/>
    <line x1="978" y1="214" x2="978" y2="208"/>
    <line x1="962" y1="246" x2="962" y2="252"/>
    <line x1="970" y1="246" x2="970" y2="252"/>
    <line x1="978" y1="246" x2="978" y2="252"/>
    <line x1="952" y1="224" x2="946" y2="224"/>
    <line x1="952" y1="236" x2="946" y2="236"/>
    <line x1="988" y1="224" x2="994" y2="224"/>
    <line x1="988" y1="236" x2="994" y2="236"/>
  </g>
  <text x="970" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e7edf5">Connected system</text>
  <text x="970" y="296" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6f819b">real or simulated</text>
</svg>
